name: MVS Backtest
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol (leave blank for both ETH-USDT and SOL-USDT)'
        required: false
      days:
        description: 'Days to backtest (default 90)'
        required: false
        default: '90'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: node backtest.js ${{ inputs.symbol }} ${{ inputs.days }}
      - name: Save backtest report
        run: |
          mkdir -p /tmp/reports
          cp backtest-report.txt /tmp/reports/ 2>/dev/null || true
          cp backtest-report.json /tmp/reports/ 2>/dev/null || true
      - uses: actions/upload-artifact@v5
        with:
          name: backtest-report
          path: /tmp/reports/
