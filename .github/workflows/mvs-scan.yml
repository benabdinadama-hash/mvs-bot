name: MVS Scan

on:
  workflow_dispatch: {}   # Triggered by cron-job.org every 15 min
  push:
    branches: [main]

concurrency:
  group: mvs-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js

      - name: Commit and push state files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          echo "{\"lastPing\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > .ping.json

          if [ ! -f state.json ]; then
            echo '{"_lastRunAt":"'$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'"}' > state.json
          fi

          git add .ping.json state.json signals.log.json diag.log.json 2>/dev/null || true
          git update-index --add state.json .ping.json 2>/dev/null || true

          if git diff --cached --quiet && git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "MVS scan $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          echo "✅ Pushed successfully"
