name: MVS Scan

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min
  workflow_dispatch: {}
  push:
    branches: [main]         # activates cron on first push

concurrency:
  group: mvs-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js

      - name: Commit and push state files
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          echo "── Files in workspace after scan ──"
          ls -la state.json signals.log.json diag.log.json 2>/dev/null || echo "Some state files missing"

          # Force-create state.json if strategy somehow didn't write it
          if [ ! -f state.json ]; then
            echo '{"_lastRunAt":"'$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'","_note":"created by workflow fallback"}' > state.json
            echo "Created fallback state.json"
          fi

          git add -f state.json signals.log.json diag.log.json 2>/dev/null || true
          git status

          if git diff --staged --quiet; then
            echo "No state changes to commit — state.json may already be up to date"
            exit 0
          fi

          git commit -m "MVS: scan state update [skip ci]"

          success=0
          for i in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if git rebase "origin/$GITHUB_REF_NAME" && git push origin "$GITHUB_REF_NAME"; then
              success=1
              break
            fi
            echo "Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done

          if [ "$success" -ne 1 ]; then
            echo "::error::Failed to push state.json after 5 attempts."
            exit 1
          fi

          echo "✅ State files pushed successfully"
