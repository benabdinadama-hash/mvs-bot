name: MVS Scan
on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js
      - name: Commit updated state files
        run: |
          git config user.name "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"
          git add state.json signals.log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "MVS: scan state update [skip ci]"
          git push || true
