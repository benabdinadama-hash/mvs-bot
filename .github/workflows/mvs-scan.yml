name: MVS Scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

concurrency:
  group: mvs-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js

      - name: Commit and push state files
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          # Always update last-ping so repo stays active and GitHub keeps firing the cron
          echo "{\"lastPing\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > .ping.json

          # Force-create state.json if missing
          if [ ! -f state.json ]; then
            echo '{"_lastRunAt":"'$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'"}' > state.json
          fi

          git add .ping.json || true
          git add state.json || true
          git add signals.log.json || true
          git add diag.log.json || true
          git update-index --add state.json 2>/dev/null || true
          git update-index --add .ping.json 2>/dev/null || true

          if git diff --cached --quiet && git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "MVS: scan $(date -u +"%H:%M") [skip ci]"

          for i in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if git rebase "origin/$GITHUB_REF_NAME" && git push origin "$GITHUB_REF_NAME"; then
              echo "✅ Pushed successfully"
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done

          echo "::error::Failed to push after 5 attempts."
          exit 1
