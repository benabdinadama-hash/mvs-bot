name: MVS Scan

on:
  workflow_dispatch: {}   # Triggered by cron-job.org every 15 min (primary)
  schedule:
    # Backup trigger, native to GitHub — fires on its own schedule even if
    # cron-job.org has an outage, its token expires, or its ping silently
    # stops. GitHub's own scheduler can lag a few minutes under load, which
    # is why this is a backup and not the primary trigger. strategy.js has
    # a duplicate-run guard so if this and cron-job.org ever land close
    # together, the second one exits immediately instead of double-firing.
    - cron: '*/15 * * * *'
  push:
    branches: [main]

concurrency:
  group: mvs-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js

      - name: Commit and push state files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          echo "{\"lastPing\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > .ping.json

          if [ ! -f state.json ]; then
            echo '{"_lastRunAt":"'$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'"}' > state.json
          fi

          git add .ping.json state.json signals.log.json diag.log.json open-positions.json 2>/dev/null || true
          git update-index --add state.json .ping.json open-positions.json 2>/dev/null || true

          if git diff --cached --quiet && git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "MVS scan $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Pull rebase before push to survive concurrent file updates on main
          # (e.g. manual file replacements via GitHub web UI mid-run).
          # --rebase keeps the commit history linear; --autostash protects any
          # local working-tree changes that haven't been staged yet.
          git pull --rebase --autostash origin main

          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          echo "✅ Pushed successfully"
