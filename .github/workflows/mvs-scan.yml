name: MVS Scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

concurrency:
  group: mvs-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history needed for rebase

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js

      - name: Commit and push state files
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          # Always write ping (no [skip ci] so GitHub counts as activity)
          echo "{\"lastPing\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > .ping.json

          if [ ! -f state.json ]; then
            echo '{"_lastRunAt":"'$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'"}' > state.json
          fi

          git add .ping.json state.json signals.log.json diag.log.json 2>/dev/null || true
          git update-index --add state.json .ping.json 2>/dev/null || true

          if git diff --cached --quiet && git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "MVS scan $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Pull latest then push — handles concurrent commits cleanly
          git pull --rebase origin "$GITHUB_REF_NAME" || git rebase --abort
          git push origin "$GITHUB_REF_NAME" && echo "✅ Pushed" && exit 0

          echo "::error::Push failed."
          exit 1
