name: MVS Scan
on:
  schedule:
    # Every 15 minutes — matches the 15min entry timeframe (config.TIMEFRAME)
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # manual trigger from Actions tab

concurrency:
  group: mvs-git-state   # SHARED across all 3 workflows — see mvs-commands.yml / mvs-weekly.yml
  cancel-in-progress: false   # queue instead of cancel: every scheduled scan should still get to run

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # < the 15min cron interval, so a hang dies before the next run fires
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js
      - name: Commit and push state files (with retry/rebase)
        run: |
          git config user.name "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"
          git add state.json signals.log.json diag.log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "MVS v8.1: scan state update [skip ci]"
          success=0
          for i in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if git rebase "origin/$GITHUB_REF_NAME" && git push origin "$GITHUB_REF_NAME"; then
              success=1
              break
            fi
            echo "Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done
          if [ "$success" -ne 1 ]; then
            echo "::error::Failed to push state.json after 5 attempts. Last run timestamp will NOT be updated upstream."
            exit 1
          fi
