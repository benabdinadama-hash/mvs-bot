name: MVS Scan

on:
  schedule:
    - cron: '*/45 * * * *'   # every 45 min — fits GitHub Actions free-tier (2000 min/month private repo)
  workflow_dispatch: {}

# ── Concurrency ─────────────────────────────────────────────────────────────
# Own group — does NOT share with mvs-commands any more (v8.3 fix).
# Scans queue (never cancel) so every 45-min tick still runs to completion.
concurrency:
  group: mvs-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run MVS scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node strategy.js

      - name: Commit and push state files (with retry/rebase)
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          # -f bypasses .gitignore so state.json is always tracked
          git add -f state.json signals.log.json diag.log.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "MVS v8.3: scan state update [skip ci]"

          success=0
          for i in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if git rebase "origin/$GITHUB_REF_NAME" && git push origin "$GITHUB_REF_NAME"; then
              success=1
              break
            fi
            echo "Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done

          if [ "$success" -ne 1 ]; then
            echo "::error::Failed to push state.json after 5 attempts."
            exit 1
          fi
