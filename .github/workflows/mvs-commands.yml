name: MVS Commands

on:
  schedule:
    - cron: '*/5 * * * *'   # poll every 5 min — commands land within 5 min of being sent
  workflow_dispatch: {}

# ── Concurrency ─────────────────────────────────────────────────────────────
# IMPORTANT: commands uses its OWN concurrency group, separate from mvs-scan.
# The old shared group (mvs-git-state) caused command runs to queue behind
# scan runs for up to 45 min, making /health /scan etc feel completely broken.
# The only file both workflows write is tg-offset.json; the rebase-push loop
# below handles the rare case where a scan commits state.json at the same time.
concurrency:
  group: mvs-commands
  cancel-in-progress: false   # never drop a command run mid-flight

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run command handler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node commands.js

      - name: Commit and push offset file (with retry/rebase)
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          # -f bypasses .gitignore so tg-offset.json is always tracked
          git add -f tg-offset.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No offset change to commit."
            exit 0
          fi

          git commit -m "MVS: update tg-offset [skip ci]"

          success=0
          for i in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if git rebase "origin/$GITHUB_REF_NAME" && git push origin "$GITHUB_REF_NAME"; then
              success=1
              break
            fi
            echo "Push attempt $i failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done

          if [ "$success" -ne 1 ]; then
            echo "::warning::Failed to push tg-offset.json after 5 attempts. Next run will re-use the same offset — commands won't replay because offset was already advanced in memory by commands.js before the git step."
            exit 0   # non-fatal: exit 0 so the workflow shows green, not red
          fi
