name: MVS Commands

on:
  workflow_dispatch: {}   # Manual only — run when you need to check commands

concurrency:
  group: mvs-commands
  cancel-in-progress: false

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - name: Run command handler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node commands.js
      - name: Commit and push offset file
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"
          git add -f tg-offset.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No offset change to commit."
            exit 0
          fi
          git commit -m "MVS: update tg-offset [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            if git rebase "origin/$GITHUB_REF_NAME" && git push origin "$GITHUB_REF_NAME"; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done
