name: MVS Commands

# v10.14.1 FIX: this workflow only had `workflow_dispatch: {}`, relying
# entirely on cron-job.org's external ping every 5 min — with NO native
# GitHub `schedule:` backup. mvs-scan.yml has explicitly carried a native
# schedule fallback since it was first written, with its own comment
# spelling out exactly why: "if cron-job.org has an outage, its token
# expires, or its ping silently stops." That exact failure mode applies
# here too, and this file was missing the fix — Telegram commands
# (/status, /positions, etc.) would stop being answered with zero error
# visible anywhere, indistinguishable from "the bot is broken." Added the
# same backup pattern now.
on:
  workflow_dispatch: {}   # Triggered by cron-job.org every 5 min (primary)
  schedule:
    # Backup trigger, native to GitHub — fires on its own schedule even if
    # cron-job.org has an outage, its token expires, or its ping silently
    # stops. Slightly slower cadence than the 5-min primary (GitHub's own
    # scheduler can also lag under load, and this is a safety net, not
    # the main path) — still closes the gap from "commands never answered
    # again" down to "answered a few minutes late, worst case."
    - cron: '*/10 * * * *'

concurrency:
  group: mvs-commands
  cancel-in-progress: false

jobs:
  commands:
    runs-on: ubuntu-latest
    # v10.15.4 FIX: same class of risk as mvs-scan.yml's timeout fix — the
    # /scan command (commands.js) runs `execSync('node strategy.js', {
    # timeout: 5*60*1000 })`, a 5-minute internal cap. A 7-minute OUTER
    # job timeout left only ~2 minutes of margin for checkout, npm
    # install, Telegram polling, and the offset-file commit/push combined
    # — too tight given strategy.js's own worst-case runtime is close to
    # that 5-minute inner cap to begin with. Raised to 10 minutes for
    # real margin, without materially changing normal-case behavior (most
    # runs finish in seconds, per the Actions history reviewed).
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - name: Run command handler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node commands.js
      - name: Commit and push offset file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"
          git add -f tg-offset.json 2>/dev/null || true
          git update-index --add tg-offset.json 2>/dev/null || true
          if git diff --cached --quiet && git diff --staged --quiet; then
            echo "No offset change."
            exit 0
          fi
          git commit -m "MVS offset $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # v10.15.5 FIX: was `git pull --rebase --autostash origin main`.
          # Same root cause as mvs-scan.yml's identical fix (see that
          # file's comment for the full story) — tg-offset.json is a
          # small, fully-self-contained, fully-regenerated value each run,
          # not something meant to be line-merged with a different run's
          # version. A rebase conflict here silently fails the whole push
          # (this job's offset update just never lands), same failure
          # class that was making commands replay/skip messages. Fetch +
          # merge -X ours guarantees this run's freshly-computed offset
          # always wins on any real conflict, and always succeeds.
          git fetch origin main
          git merge -X ours --no-edit origin/main

          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          echo "✅ Offset pushed"
