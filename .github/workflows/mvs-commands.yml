name: MVS Commands
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
jobs:
  commands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run command handler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node commands.js
      - name: Commit updated state files
        run: |
          git config user.name "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"
          git add state.json signals.log.json tg-offset.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "MVS: update state/offset [skip ci]"
          git push || true
