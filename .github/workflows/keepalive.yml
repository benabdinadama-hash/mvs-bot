name: MVS Keepalive

# ─────────────────────────────────────────────────────────────────────────
# WHY THIS FILE EXISTS: GitHub automatically disables ALL of a repo's
# scheduled workflows after 60 days with no repository activity (commits)
# — see: https://docs.github.com/actions/using-workflows/disabling-and-enabling-a-workflow
#
# mvs-scan.yml already commits on every run (it writes .ping.json with a
# fresh timestamp every 15 minutes), which normally keeps the whole repo
# "active" on its own — one commit from ANY workflow resets the 60-day
# clock for every scheduled workflow in the repo, not just the one that
# made it. So in the common case this file does nothing you'd notice.
#
# It exists as a second, fully independent safety net: if mvs-scan.yml's
# own two triggers (cron-job.org's external ping AND GitHub's native
# schedule) ever somehow BOTH stopped firing for an extended stretch —
# cron-job.org account/token issue, a GitHub-side scheduling problem,
# you rotating a secret and forgetting to update cron-job.org, etc. —
# this workflow keeps the repo active on a completely separate schedule,
# so the underlying scan workflows never get caught in the auto-disable
# trap in the first place. Runs daily: roughly 60x margin against the
# 60-day window even if individual runs occasionally get delayed or
# skipped under GitHub's own load.
#
# You do not need to open the repo, click anything, or do anything for
# this to work — that's the whole point.
# ─────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 5 * * *'   # once a day, 05:00 UTC — plenty of margin, low cost
  workflow_dispatch: {}    # manual trigger, e.g. to bootstrap right after setup

permissions:
  contents: write

concurrency:
  group: mvs-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Touch heartbeat file and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "mvs-bot"
          git config user.email "mvs-bot@users.noreply.github.com"

          mkdir -p .github/keepalive
          if [ ! -f .github/keepalive/README.md ]; then
            {
              echo "This directory exists solely so this repo always has recent commit"
              echo "activity, which stops GitHub from auto-disabling the scheduled"
              echo "workflows (mvs-scan.yml, mvs-commands.yml, mvs-weekly.yml) after 60"
              echo "days of repo inactivity. heartbeat.txt is updated daily by"
              echo "keepalive.yml. Safe to ignore -- nothing in here affects the bot's"
              echo "trading logic."
            } > .github/keepalive/README.md
          fi
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive/heartbeat.txt

          git add .github/keepalive/

          if git diff --cached --quiet; then
            echo "Nothing to commit — unexpected for a timestamp file, but harmless."
            exit 0
          fi

          git commit -m "chore: keepalive heartbeat $(date -u +%Y-%m-%d)"

          # v10.15.5: same fix applied across every workflow in this repo
          # for consistency (see mvs-scan.yml's comment for the full
          # story) — this file's actual risk was already low (nothing
          # else touches .github/keepalive/, so a plain rebase rarely had
          # anything to conflict with), but there's no reason to leave one
          # workflow on the old, riskier pattern once the others are fixed.
          git fetch origin main
          git merge -X ours --no-edit origin/main

          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          echo "✅ Keepalive heartbeat pushed"
